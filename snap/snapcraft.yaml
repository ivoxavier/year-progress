title: year-progress
name: year-progress
base: core24
version: '0.0.2'
summary: Year Progress
contact: ivofernandes12@gmail.com
issues: https://github.com/ivoxavier/year-progress/issues
website: https://github.com/ivoxavier/year-progress/
license: GPL-3.0-only
description: |
  A super fast application built with Vala and GTK4 for GNOME that shows you the exact percentage of the year that has already passed in real time.

grade: stable
confinement: strict 

apps:
  year-progress:
    command: usr/bin/year-progress
    extensions: [gnome]
    common-id: year-progress.desktop 
    desktop: meta/gui/year-progress.desktop 

parts:
  year-progress:
    plugin: meson
    source: .
    meson-parameters:
      - --prefix=/usr
    build-packages:
      - valac
      - libgtk-4-dev
      - gettext
    override-build: |
      craftctl default 
      
      mkdir -p $CRAFT_PART_INSTALL/meta/gui
      cp $CRAFT_PART_SRC/data/year-progress.desktop $CRAFT_PART_INSTALL/meta/gui/
      cp $CRAFT_PART_SRC/data/year-progress.svg $CRAFT_PART_INSTALL/meta/gui/
      
      sed -i 's|^Icon=.*|Icon=${SNAP}/meta/gui/year-progress.svg|g' $CRAFT_PART_INSTALL/meta/gui/year-progress.desktop
