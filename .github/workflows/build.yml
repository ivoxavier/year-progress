name: Build Snap
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-snap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Snap
        uses: snapcore/action-build@v1
        id: build

      - name: Save file as .snap
        uses: actions/upload-artifact@v4
        with:
          name: year-progress-snap
          path: ${{ steps.build.outputs.snap }}
